version: "3.8"
services:
  productservice-api:
    build:
      context: ./ProductService
      dockerfile: src/ProductService.Api/Dockerfile
    image: productservice-api:latest
    container_name: productservice-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDbSettings__ConnectionString=mongodb://mongo:27017
      - MongoDbSettings__DatabaseName=ProductServiceDB
      - JWT__Key=ce4144d0518d19b1342d14d60e9f0a433c0f3dbc72957dcf5f9e6fba6e41abc2
    ports:
      - "8080:8080"
    depends_on:
      - mongo
  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
