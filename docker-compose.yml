version: "3.8"
services:
  productservice-api:
    build:
      context: ./
      dockerfile: ProductService/src/ProductService.Api/Dockerfile
    image: productservice-api:latest
    container_name: productservice-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MongoDbSettings__ConnectionString=mongodb://mongo:27017
      - MongoDbSettings__DatabaseName=ProductServiceDB
      - JWT__Key=ce4144d0518d19b1342d14d60e9f0a433c0f3dbc72957dcf5f9e6fba6e41abc2
      - RabbitMQ__Uri=amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8080:8080"
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - mynet

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - mynet

  emailservice.api:
    build:
      context: .
      dockerfile: ./EmailService/EmailService.Api/Dockerfile
    container_name: emailservice.api
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
      - "5002:5000"
    depends_on:
      - rabbitmq
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - mynet

  identityservice.api:
    build:
      context: .
      dockerfile: ./IdentityService/src/IdentityService.Api/Dockerfile
    container_name: identityservice.api
    ports:
      - "5672:5672"
      - "15672:15672"
      - "5001:5000"
    depends_on:
      - mongo
      - rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - mynet

  mongo:
    image: mongo:7.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mynet

volumes:
  mongo_data:
  rabbitmq_data:

networks:
  mynet:
    driver: bridge
